<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruppe 18 - Benchmark Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #aaa;
            font-size: 1.1em;
        }

        .kpi-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
        }

        .kpi-card h3 {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kpi-card .value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .kpi-card .comparison {
            font-size: 0.85em;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .positive { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .negative { background: rgba(255, 71, 87, 0.2); color: #ff4757; }

        .rosenheim { color: #00d4ff; }
        .freiburg { color: #7b2cbf; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-container h2 {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-container h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #00d4ff, #7b2cbf);
            border-radius: 2px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .legend-custom {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .filter-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .filter-section label {
            font-weight: 500;
        }

        .filter-section select {
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1em;
            cursor: pointer;
        }

        .filter-section select option {
            background: #1a1a2e;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        th:first-child, td:first-child {
            text-align: left;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .highlight-rosenheim {
            border-left: 3px solid #00d4ff;
        }

        .highlight-freiburg {
            border-left: 3px solid #7b2cbf;
        }
    </style>
</head>

        // Chart-Instanzen speichern für Updates

        const colors = {
            rosenheim: '#00d4ff',
            rosenheimBg: 'rgba(0, 212, 255, 0.2)',
            freiburg: '#7b2cbf',
            freiburgBg: 'rgba(123, 44, 191, 0.2)'
        };

        // Daten nach Filialgruppe filtern
        function getDataByGroup(group, data = benchmarkData) {
            return data.filter(d => d.Filialgruppe === group);
        }

        // Daten nach Monat filtern
        function filterByMonth(month) {
            if (month === 'all') return benchmarkData;
            return benchmarkData.filter(d => d.Monat === month);
        }

        // Formatierung
        function formatCurrency(value) {
            return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(value);
        }

        function formatPercent(value) {
            return value.toFixed(1) + '%';
        }

        // KPI Cards generieren
        function generateKPICards(filteredData) {
            const rosenheim = getDataByGroup('Rosenheim', filteredData);
            const freiburg = getDataByGroup('Freiburg/Karlsruhe', filteredData);

            const sumRosenheim = {
                umsatz: rosenheim.reduce((a, b) => a + b.UmsatzEur, 0),
                nettogewinn: rosenheim.reduce((a, b) => a + b.NettogewinnEur, 0),
                marge: rosenheim.reduce((a, b) => a + b.NettogewinnMargeProzent, 0) / rosenheim.length
            };

            const sumFreiburg = {
                umsatz: freiburg.reduce((a, b) => a + b.UmsatzEur, 0),
                nettogewinn: freiburg.reduce((a, b) => a + b.NettogewinnEur, 0),
                marge: freiburg.reduce((a, b) => a + b.NettogewinnMargeProzent, 0) / freiburg.length
            };

            const umsatzDiff = ((sumRosenheim.umsatz / sumFreiburg.umsatz) - 1) * 100;
            const margeDiff = sumRosenheim.marge - sumFreiburg.marge;
            const gewinnDiff = ((sumRosenheim.nettogewinn / sumFreiburg.nettogewinn) - 1) * 100;

            document.getElementById('kpiCards').innerHTML = `
                <div class="kpi-card">
                    <h3>Umsatz Rosenheim</h3>
                    <div class="value rosenheim">${formatCurrency(sumRosenheim.umsatz)}</div>
                    <span class="comparison ${umsatzDiff >= 0 ? 'negative' : 'positive'}">${umsatzDiff >= 0 ? '+' : ''}${umsatzDiff.toFixed(1)}% vs FK</span>
                </div>
                <div class="kpi-card">
                    <h3>Umsatz Freiburg/Karlsruhe</h3>
                    <div class="value freiburg">${formatCurrency(sumFreiburg.umsatz)}</div>
                    <span class="comparison">Benchmark</span>
                </div>
                <div class="kpi-card">
                    <h3>Ø Nettomarge Rosenheim</h3>
                    <div class="value rosenheim">${formatPercent(sumRosenheim.marge)}</div>
                    <span class="comparison ${margeDiff >= 0 ? 'positive' : 'negative'}">${margeDiff >= 0 ? '+' : ''}${margeDiff.toFixed(1)}pp vs FK</span>
                </div>
                <div class="kpi-card">
                    <h3>Ø Nettomarge Freiburg/K.</h3>
                    <div class="value freiburg">${formatPercent(sumFreiburg.marge)}</div>
                    <span class="comparison">Benchmark</span>
                </div>
                <div class="kpi-card">
                    <h3>Nettogewinn Rosenheim</h3>
                    <div class="value rosenheim">${formatCurrency(sumRosenheim.nettogewinn)}</div>
                    <span class="comparison ${gewinnDiff >= 0 ? 'negative' : 'positive'}">${gewinnDiff >= 0 ? '+' : ''}${gewinnDiff.toFixed(1)}% vs FK</span>
                </div>
                <div class="kpi-card">
                    <h3>Nettogewinn Freiburg/K.</h3>
                    <div class="value freiburg">${formatCurrency(sumFreiburg.nettogewinn)}</div>
                    <span class="comparison">Benchmark</span>
                </div>
            `;
        }

        // Umsatz-Chart
        function createRevenueChart() {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            const rosenheim = getDataByGroup('Rosenheim');
            const freiburg = getDataByGroup('Freiburg/Karlsruhe');

            charts.revenue = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: rosenheim.map(d => d.Monat),
                    datasets: [
                        {
                            label: 'Rosenheim',
                            data: rosenheim.map(d => d.UmsatzEur),
                            borderColor: colors.rosenheim,
                            backgroundColor: colors.rosenheimBg,
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: 'Freiburg/Karlsruhe',
                            data: freiburg.map(d => d.UmsatzEur),
                            borderColor: colors.freiburg,
                            backgroundColor: colors.freiburgBg,
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        x: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { ticks: { color: '#aaa', callback: v => formatCurrency(v) }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
        }

        // Gewinn-Chart
        function createProfitChart() {
            const ctx = document.getElementById('profitChart').getContext('2d');
            const rosenheim = getDataByGroup('Rosenheim');
            const freiburg = getDataByGroup('Freiburg/Karlsruhe');

            charts.profit = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: rosenheim.map(d => d.Monat),
                    datasets: [
                        {
                            label: 'Rosenheim',
                            data: rosenheim.map(d => d.NettogewinnEur),
                            backgroundColor: colors.rosenheim,
                            borderRadius: 5
                        },
                        {
                            label: 'Freiburg/Karlsruhe',
                            data: freiburg.map(d => d.NettogewinnEur),
                            backgroundColor: colors.freiburg,
                            borderRadius: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        x: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { ticks: { color: '#aaa', callback: v => formatCurrency(v) }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
        }

        // Margen-Chart
        function createMarginChart() {
            const ctx = document.getElementById('marginChart').getContext('2d');
            const rosenheim = getDataByGroup('Rosenheim');
            const freiburg = getDataByGroup('Freiburg/Karlsruhe');

            charts.margin = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: rosenheim.map(d => d.Monat),
                    datasets: [
                        {
                            label: 'Bruttomarge Rosenheim',
                            data: rosenheim.map(d => d.BruttogewinnMargeProzent),
                            borderColor: colors.rosenheim,
                            borderDash: [],
                            tension: 0.4,
                            pointRadius: 5
                        },
                        {
                            label: 'Bruttomarge FK',
                            data: freiburg.map(d => d.BruttogewinnMargeProzent),
                            borderColor: colors.freiburg,
                            borderDash: [],
                            tension: 0.4,
                            pointRadius: 5
                        },
                        {
                            label: 'Nettomarge Rosenheim',
                            data: rosenheim.map(d => d.NettogewinnMargeProzent),
                            borderColor: colors.rosenheim,
                            borderDash: [5, 5],
                            tension: 0.4,
                            pointRadius: 5
                        },
                        {
                            label: 'Nettomarge FK',
                            data: freiburg.map(d => d.NettogewinnMargeProzent),
                            borderColor: colors.freiburg,
                            borderDash: [5, 5],
                            tension: 0.4,
                            pointRadius: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        x: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { ticks: { color: '#aaa', callback: v => v + '%' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
        }

        // Kostenstruktur-Chart
        function createCostChart() {
            const ctx = document.getElementById('costChart').getContext('2d');
            const rosenheim = getDataByGroup('Rosenheim');
            const freiburg = getDataByGroup('Freiburg/Karlsruhe');

            const avgRosenheim = {
                personal: rosenheim.reduce((a, b) => a + b.PersonalkostenAnteilProzent, 0) / rosenheim.length,
                betrieb: rosenheim.reduce((a, b) => a + b.BetriebskostenQuoteProzent, 0) / rosenheim.length
            };

            const avgFreiburg = {
                personal: freiburg.reduce((a, b) => a + b.PersonalkostenAnteilProzent, 0) / freiburg.length,
                betrieb: freiburg.reduce((a, b) => a + b.BetriebskostenQuoteProzent, 0) / freiburg.length
            };

            charts.cost = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Personal Rosenheim', 'Betrieb Rosenheim', 'Personal FK', 'Betrieb FK'],
                    datasets: [{
                        data: [avgRosenheim.personal, avgRosenheim.betrieb, avgFreiburg.personal, avgFreiburg.betrieb],
                        backgroundColor: [colors.rosenheim, colors.rosenheimBg, colors.freiburg, colors.freiburgBg],
                        borderWidth: 2,
                        borderColor: '#1a1a2e'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' },
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        // Radar-Chart
        function createRadarChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const rosenheim = getDataByGroup('Rosenheim');
            const freiburg = getDataByGroup('Freiburg/Karlsruhe');

            // Durchschnittswerte für Radar
            const avgR = {
                brutto: rosenheim.reduce((a, b) => a + b.BruttogewinnMargeProzent, 0) / rosenheim.length,
                netto: rosenheim.reduce((a, b) => a + b.NettogewinnMargeProzent, 0) / rosenheim.length,
                betrieb: 10 - rosenheim.reduce((a, b) => a + b.BetriebskostenQuoteProzent, 0) / rosenheim.length, // invertiert
                personal: 100 - rosenheim.reduce((a, b) => a + b.PersonalkostenAnteilProzent, 0) / rosenheim.length // invertiert
            };

            const avgF = {
                brutto: freiburg.reduce((a, b) => a + b.BruttogewinnMargeProzent, 0) / freiburg.length,
                netto: freiburg.reduce((a, b) => a + b.NettogewinnMargeProzent, 0) / freiburg.length,
                betrieb: 10 - freiburg.reduce((a, b) => a + b.BetriebskostenQuoteProzent, 0) / freiburg.length,
                personal: 100 - freiburg.reduce((a, b) => a + b.PersonalkostenAnteilProzent, 0) / freiburg.length
            };

            charts.radar = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Bruttomarge', 'Nettomarge', 'Betriebseffizienz', 'Personalkosteneffizienz'],
                    datasets: [
                        {
                            label: 'Rosenheim',
                            data: [avgR.brutto, avgR.netto, avgR.betrieb, avgR.personal],
                            borderColor: colors.rosenheim,
                            backgroundColor: colors.rosenheimBg,
                            pointBackgroundColor: colors.rosenheim
                        },
                        {
                            label: 'Freiburg/Karlsruhe',
                            data: [avgF.brutto, avgF.netto, avgF.betrieb, avgF.personal],
                            borderColor: colors.freiburg,
                            backgroundColor: colors.freiburgBg,
                            pointBackgroundColor: colors.freiburg
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#fff' },
                            ticks: { color: '#aaa', backdropColor: 'transparent' }
                        }
                    }
                }
            });
        }

        // Datentabelle generieren
        function generateDataTable(filteredData) {
            const tableHTML = `
                <thead>
                    <tr>
                        <th>Monat</th>
                        <th>Filialgruppe</th>
                        <th>Umsatz</th>
                        <th>Bruttogewinn</th>
                        <th>Nettogewinn</th>
                        <th>Bruttomarge</th>
                        <th>Nettomarge</th>
                    </tr>
                </thead>
                <tbody>
                    ${filteredData.map(d => `
                        <tr class="${d.Filialgruppe === 'Rosenheim' ? 'highlight-rosenheim' : 'highlight-freiburg'}">
                            <td>${d.Monat}</td>
                            <td>${d.Filialgruppe}</td>
                            <td>${formatCurrency(d.UmsatzEur)}</td>
                            <td>${formatCurrency(d.BruttogewinnEur)}</td>
                            <td>${formatCurrency(d.NettogewinnEur)}</td>
                            <td>${formatPercent(d.BruttogewinnMargeProzent)}</td>
                            <td>${formatPercent(d.NettogewinnMargeProzent)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
            document.getElementById('dataTable').innerHTML = tableHTML;
        }

        // Dashboard aktualisieren
        function updateDashboard() {
            const month = document.getElementById('monthFilter').value;
            const filteredData = filterByMonth(month);
            generateKPICards(filteredData);
            generateDataTable(filteredData);
        }

        // Initialisierung
        document.addEventListener('DOMContentLoaded', () => {
            generateKPICards(benchmarkData);
            createRevenueChart();
            createProfitChart();
            createMarginChart();
            createCostChart();
            createRadarChart();
            generateDataTable(benchmarkData);
        });
    </script>
</body>
</html>
