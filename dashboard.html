        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            text-align: center;

            backdrop-filter: blur(10px);

            background-clip: text;
        }

        .header p {
            color: #aaa;
            font-size: clamp(0.9em, 2vw, 1.1em);
        }

        .kpi-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .kpi-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
            min-width: 0;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
        }

        .kpi-card h3 {
            font-size: clamp(0.7em, 1.5vw, 0.85em);
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .kpi-card .value {
            font-size: clamp(1.1em, 2.5vw, 1.6em);
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .kpi-card .comparison {
            font-size: clamp(0.7em, 1.2vw, 0.8em);
            padding: 4px 8px;
            border-radius: 15px;
            display: inline-block;
        }

        .positive { background: rgba(0, 255, 136, 0.2); color: #00ff88; }

        .rosenheim { color: #00d4ff; }
        .freiburg { color: #7b2cbf; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .kpi-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .kpi-card {
                padding: 12px 10px;
            }
        }

        @media (max-width: 480px) {
            .kpi-cards {
                grid-template-columns: 1fr;
            }
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 0;
            overflow: hidden;

            color: #fff;
            display: flex;

            flex-shrink: 0;

            font-weight: 600;

            return data.filter(d => d.Filialgruppe === group);

        // Daten nach Monat filtern
        function filterByMonth(month) {
            if (month === 'all') return benchmarkData;
            return benchmarkData.filter(d => d.Monat === month);
        }

        // Formatierung
        function formatCurrency(value) {
            return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(value);
        }

        function formatCurrencyShort(value) {
            if (value >= 1000000) return (value / 1000000).toFixed(1) + ' Mio €';
            if (value >= 1000) return (value / 1000).toFixed(0) + ' Tsd €';
            return formatCurrency(value);
        }

        function formatPercent(value) {
            return value.toFixed(1) + '%';

        // KPI Cards generieren
        function generateKPICards(filteredData) {
            const rosenheim = getDataByGroup('Rosenheim', filteredData);
            const freiburg = getDataByGroup('Freiburg/Karlsruhe', filteredData);

            const sumRosenheim = {
                umsatz: rosenheim.reduce((a, b) => a + b.UmsatzEur, 0),
                nettogewinn: rosenheim.reduce((a, b) => a + b.NettogewinnEur, 0),
                marge: rosenheim.length > 0 ? rosenheim.reduce((a, b) => a + b.NettogewinnMargeProzent, 0) / rosenheim.length : 0

            const sumFreiburg = {
                umsatz: freiburg.reduce((a, b) => a + b.UmsatzEur, 0),
                nettogewinn: freiburg.reduce((a, b) => a + b.NettogewinnEur, 0),
                marge: freiburg.length > 0 ? freiburg.reduce((a, b) => a + b.NettogewinnMargeProzent, 0) / freiburg.length : 0
            };

            const umsatzDiff = sumFreiburg.umsatz > 0 ? ((sumRosenheim.umsatz / sumFreiburg.umsatz) - 1) * 100 : 0;
            const margeDiff = sumRosenheim.marge - sumFreiburg.marge;
            const gewinnDiff = sumFreiburg.nettogewinn > 0 ? ((sumRosenheim.nettogewinn / sumFreiburg.nettogewinn) - 1) * 100 : 0;

            document.getElementById('kpiCards').innerHTML = `
                <div class="kpi-card">
                    <h3>Umsatz Rosenheim</h3>
                    <div class="value rosenheim">${formatCurrencyShort(sumRosenheim.umsatz)}</div>
                    <span class="comparison ${umsatzDiff >= 0 ? 'positive' : 'negative'}">${umsatzDiff >= 0 ? '+' : ''}${umsatzDiff.toFixed(1)}% vs FK</span>
                </div>
                <div class="kpi-card">
                    <h3>Umsatz Freiburg/K.</h3>
                    <div class="value freiburg">${formatCurrencyShort(sumFreiburg.umsatz)}</div>
                    <span class="comparison">Benchmark</span>
                </div>
                <div class="kpi-card">
                    <h3>Nettomarge Rosenheim</h3>
                    <div class="value rosenheim">${formatPercent(sumRosenheim.marge)}</div>
                    <span class="comparison ${margeDiff >= 0 ? 'positive' : 'negative'}">${margeDiff >= 0 ? '+' : ''}${margeDiff.toFixed(1)}pp</span>
                </div>
                <div class="kpi-card">
                    <h3>Nettomarge Freiburg/K.</h3>
                    <div class="value freiburg">${formatPercent(sumFreiburg.marge)}</div>
                    <span class="comparison">Benchmark</span>
                </div>
                <div class="kpi-card">
                    <h3>Gewinn Rosenheim</h3>
                    <div class="value rosenheim">${formatCurrencyShort(sumRosenheim.nettogewinn)}</div>
                    <span class="comparison ${gewinnDiff >= 0 ? 'positive' : 'negative'}">${gewinnDiff >= 0 ? '+' : ''}${gewinnDiff.toFixed(1)}%</span>
                </div>
                <div class="kpi-card">
                    <h3>Gewinn Freiburg/K.</h3>
                    <div class="value freiburg">${formatCurrencyShort(sumFreiburg.nettogewinn)}</div>
                    <span class="comparison">Benchmark</span>
                </div>
            `;
        }

        // Chart-Optionen (gemeinsam)
        function getChartOptions(yCallback) {
            return {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        labels: { color: '#fff', boxWidth: 12, padding: 10 },
                        position: 'top'
                    }
                },
                scales: {
                    x: {
                        ticks: { color: '#aaa', maxRotation: 45, minRotation: 45, font: { size: 10 } },
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    },
                    y: {
                        ticks: { color: '#aaa', callback: yCallback, font: { size: 10 } },
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    }
                }
            };
        }

        // Alle Charts zerstören
        function destroyCharts() {
            Object.values(charts).forEach(chart => {
                if (chart) chart.destroy();
            });
            charts = {};
        }

        // Umsatz-Chart erstellen/aktualisieren
        function updateRevenueChart(filteredData, isSingleMonth) {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            if (charts.revenue) charts.revenue.destroy();

            const rosenheim = getDataByGroup('Rosenheim', filteredData);
            const freiburg = getDataByGroup('Freiburg/Karlsruhe', filteredData);

            if (isSingleMonth) {
                // Einzelner Monat: Balkenvergleich
                document.getElementById('revenueTitle').textContent = 'Umsatz-Vergleich';
                charts.revenue = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Rosenheim', 'Freiburg/Karlsruhe'],
                        datasets: [{
                            data: [rosenheim[0]?.UmsatzEur || 0, freiburg[0]?.UmsatzEur || 0],
                            backgroundColor: [colors.rosenheim, colors.freiburg],
                            borderRadius: 8
                        }]
                    },
                    options: {
                        ...getChartOptions(v => formatCurrencyShort(v)),
                        plugins: { legend: { display: false } },
                        indexAxis: 'y'
                    }
                });
            } else {
                // Alle Monate: Liniendiagramm
                document.getElementById('revenueTitle').textContent = 'Umsatzentwicklung';
                charts.revenue = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: rosenheim.map(d => d.Monat),
                        datasets: [
                            {
                                label: 'Rosenheim',
                                data: rosenheim.map(d => d.UmsatzEur),
                                borderColor: colors.rosenheim,
                                backgroundColor: colors.rosenheimBg,
                                fill: true,
                                tension: 0.4
                            },
                            {
                                label: 'Freiburg/Karlsruhe',
                                data: freiburg.map(d => d.UmsatzEur),
                                borderColor: colors.freiburg,
                                backgroundColor: colors.freiburgBg,
                                fill: true,
                                tension: 0.4
                            }
                        ]
                    },
                    options: getChartOptions(v => formatCurrencyShort(v))
                });
            }
        }

        // Gewinn-Chart erstellen/aktualisieren
        function updateProfitChart(filteredData, isSingleMonth) {
            const ctx = document.getElementById('profitChart').getContext('2d');
            if (charts.profit) charts.profit.destroy();

            const rosenheim = getDataByGroup('Rosenheim', filteredData);
            const freiburg = getDataByGroup('Freiburg/Karlsruhe', filteredData);

            if (isSingleMonth) {
                document.getElementById('profitTitle').textContent = 'Nettogewinn-Vergleich';
                charts.profit = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Rosenheim', 'Freiburg/Karlsruhe'],
                        datasets: [{
                            data: [rosenheim[0]?.NettogewinnEur || 0, freiburg[0]?.NettogewinnEur || 0],
                            backgroundColor: [colors.rosenheim, colors.freiburg],
                            borderRadius: 8
                        }]
                    },
                    options: {
                        ...getChartOptions(v => formatCurrencyShort(v)),
                        plugins: { legend: { display: false } },
                        indexAxis: 'y'
                    }
                });
            } else {
                document.getElementById('profitTitle').textContent = 'Nettogewinn-Entwicklung';
                charts.profit = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: rosenheim.map(d => d.Monat),
                        datasets: [
                            {
                                label: 'Rosenheim',
                                data: rosenheim.map(d => d.NettogewinnEur),
                                backgroundColor: colors.rosenheim,
                                borderRadius: 5
                            },
                            {
                                label: 'Freiburg/Karlsruhe',
                                data: freiburg.map(d => d.NettogewinnEur),
                                backgroundColor: colors.freiburg,
                                borderRadius: 5
                            }
                        ]
                    },
                    options: getChartOptions(v => formatCurrencyShort(v))
                });
            }
        }

        // Margen-Chart erstellen/aktualisieren
        function updateMarginChart(filteredData, isSingleMonth) {
            const ctx = document.getElementById('marginChart').getContext('2d');
            if (charts.margin) charts.margin.destroy();

            const rosenheim = getDataByGroup('Rosenheim', filteredData);
            const freiburg = getDataByGroup('Freiburg/Karlsruhe', filteredData);

            if (isSingleMonth) {
                document.getElementById('marginTitle').textContent = 'Margen-Vergleich (%)';
                charts.margin = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Bruttomarge', 'Nettomarge'],
                        datasets: [
                            {
                                label: 'Rosenheim',
                                data: [rosenheim[0]?.BruttogewinnMargeProzent || 0, rosenheim[0]?.NettogewinnMargeProzent || 0],
                                backgroundColor: colors.rosenheim,
                                borderRadius: 5
                            },
                            {
                                label: 'Freiburg/Karlsruhe',
                                data: [freiburg[0]?.BruttogewinnMargeProzent || 0, freiburg[0]?.NettogewinnMargeProzent || 0],
                                backgroundColor: colors.freiburg,
                                borderRadius: 5
                            }
                        ]
                    },
                    options: getChartOptions(v => v + '%')
                });
            } else {
                document.getElementById('marginTitle').textContent = 'Margen-Vergleich (%)';
                charts.margin = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: rosenheim.map(d => d.Monat),
                        datasets: [
                            {
                                label: 'Bruttomarge Rosenheim',
                                data: rosenheim.map(d => d.BruttogewinnMargeProzent),
                                borderColor: colors.rosenheim,
                                tension: 0.4,
                                pointRadius: 4
                            },
                            {
                                label: 'Bruttomarge FK',
                                data: freiburg.map(d => d.BruttogewinnMargeProzent),
                                borderColor: colors.freiburg,
                                tension: 0.4,
                                pointRadius: 4
                            },
                            {
                                label: 'Nettomarge Rosenheim',
                                data: rosenheim.map(d => d.NettogewinnMargeProzent),
                                borderColor: colors.rosenheim,
                                borderDash: [5, 5],
                                tension: 0.4,
                                pointRadius: 4
                            },
                            {
                                label: 'Nettomarge FK',
                                data: freiburg.map(d => d.NettogewinnMargeProzent),
                                borderColor: colors.freiburg,
                                borderDash: [5, 5],
                                tension: 0.4,
                                pointRadius: 4
                            }
                        ]
                    },
                    options: getChartOptions(v => v + '%')
                });
            }
        }

        // Kostenstruktur-Chart erstellen/aktualisieren
        function updateCostChart(filteredData) {
            const ctx = document.getElementById('costChart').getContext('2d');
            if (charts.cost) charts.cost.destroy();

            const rosenheim = getDataByGroup('Rosenheim', filteredData);
            const freiburg = getDataByGroup('Freiburg/Karlsruhe', filteredData);

            const avgRosenheim = {
                personal: rosenheim.length > 0 ? rosenheim.reduce((a, b) => a + b.PersonalkostenEur, 0) : 0,
                betrieb: rosenheim.length > 0 ? rosenheim.reduce((a, b) => a + b.BetriebskostenEur, 0) : 0
            };

            const avgFreiburg = {
                personal: freiburg.length > 0 ? freiburg.reduce((a, b) => a + b.PersonalkostenEur, 0) : 0,
                betrieb: freiburg.length > 0 ? freiburg.reduce((a, b) => a + b.BetriebskostenEur, 0) : 0
            };

            charts.cost = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Rosenheim', 'Freiburg/Karlsruhe'],
                    datasets: [
                        {
                            label: 'Personalkosten',
                            data: [avgRosenheim.personal, avgFreiburg.personal],
                            backgroundColor: [colors.rosenheim, colors.freiburg],
                            borderRadius: 5
                        },
                        {
                            label: 'Betriebskosten',
                            data: [avgRosenheim.betrieb, avgFreiburg.betrieb],
                            backgroundColor: [colors.rosenheimBg, colors.freiburgBg],
                            borderRadius: 5
                        }
                    ]
                },
                options: {
                    ...getChartOptions(v => formatCurrencyShort(v)),
                    scales: {
                        x: { stacked: true, ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { stacked: true, ticks: { color: '#aaa', callback: v => formatCurrencyShort(v) }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
        }

        // Radar-Chart erstellen/aktualisieren
        function updateRadarChart(filteredData) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (charts.radar) charts.radar.destroy();

            const rosenheim = getDataByGroup('Rosenheim', filteredData);
            const freiburg = getDataByGroup('Freiburg/Karlsruhe', filteredData);

            const avgR = {
                brutto: rosenheim.length > 0 ? rosenheim.reduce((a, b) => a + b.BruttogewinnMargeProzent, 0) / rosenheim.length : 0,
                netto: rosenheim.length > 0 ? rosenheim.reduce((a, b) => a + b.NettogewinnMargeProzent, 0) / rosenheim.length : 0,
                betrieb: rosenheim.length > 0 ? 20 - rosenheim.reduce((a, b) => a + b.BetriebskostenQuoteProzent, 0) / rosenheim.length : 0,
                personal: rosenheim.length > 0 ? 100 - rosenheim.reduce((a, b) => a + b.PersonalkostenAnteilProzent, 0) / rosenheim.length : 0
            };

            const avgF = {
                brutto: freiburg.length > 0 ? freiburg.reduce((a, b) => a + b.BruttogewinnMargeProzent, 0) / freiburg.length : 0,
                netto: freiburg.length > 0 ? freiburg.reduce((a, b) => a + b.NettogewinnMargeProzent, 0) / freiburg.length : 0,
                betrieb: freiburg.length > 0 ? 20 - freiburg.reduce((a, b) => a + b.BetriebskostenQuoteProzent, 0) / freiburg.length : 0,
                personal: freiburg.length > 0 ? 100 - freiburg.reduce((a, b) => a + b.PersonalkostenAnteilProzent, 0) / freiburg.length : 0
            };

            charts.radar = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Bruttomarge', 'Nettomarge', 'Betriebseffizienz', 'Personalkosteneffizienz'],
                    datasets: [
                        {
                            label: 'Rosenheim',
                            data: [avgR.brutto, avgR.netto, avgR.betrieb, avgR.personal],
                            borderColor: colors.rosenheim,
                            backgroundColor: colors.rosenheimBg,
                            pointBackgroundColor: colors.rosenheim
                        },
                        {
                            label: 'Freiburg/Karlsruhe',
                            data: [avgF.brutto, avgF.netto, avgF.betrieb, avgF.personal],
                            borderColor: colors.freiburg,
                            backgroundColor: colors.freiburgBg,
                            pointBackgroundColor: colors.freiburg
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#fff', font: { size: 11 } },
                            ticks: { color: '#aaa', backdropColor: 'transparent' }
                        }
                    }
                }
            });
        }

        // Datentabelle generieren
        function generateDataTable(filteredData) {
            const tableHTML = `
                <thead>
                    <tr>
                        <th>Monat</th>
                        <th>Filiale</th>
                        <th>Umsatz</th>
                        <th>Bruttogewinn</th>
                        <th>Nettogewinn</th>
                        <th>Brutto-%</th>
                        <th>Netto-%</th>
                    </tr>
                </thead>
                <tbody>
                    ${filteredData.map(d => `
                        <tr class="${d.Filialgruppe === 'Rosenheim' ? 'highlight-rosenheim' : 'highlight-freiburg'}">
                            <td>${d.Monat}</td>
                            <td>${d.Filialgruppe === 'Freiburg/Karlsruhe' ? 'FK' : 'RO'}</td>
                            <td>${formatCurrencyShort(d.UmsatzEur)}</td>
                            <td>${formatCurrencyShort(d.BruttogewinnEur)}</td>
                            <td>${formatCurrencyShort(d.NettogewinnEur)}</td>
                            <td>${formatPercent(d.BruttogewinnMargeProzent)}</td>
                            <td>${formatPercent(d.NettogewinnMargeProzent)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
            document.getElementById('dataTable').innerHTML = tableHTML;
        }

        // Dashboard komplett aktualisieren
        function updateDashboard() {
            const month = document.getElementById('monthFilter').value;
            const filteredData = filterByMonth(month);
            const isSingleMonth = month !== 'all';

            // Monat-Indikator aktualisieren
            document.getElementById('monthIndicator').textContent =
                month === 'all' ? 'Gesamtjahr 2024' : monthNames[month];

            // Alle Komponenten aktualisieren
            generateKPICards(filteredData);
            updateRevenueChart(filteredData, isSingleMonth);
            updateProfitChart(filteredData, isSingleMonth);
            updateMarginChart(filteredData, isSingleMonth);
            updateCostChart(filteredData);
            updateRadarChart(filteredData);
            generateDataTable(filteredData);
        }

        // Initialisierung
        document.addEventListener('DOMContentLoaded', () => {
            updateDashboard();
        });
    </script>
</body>
</html>
